<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل الفعالية — دليل فعاليات الجامعة</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg site-navbar sticky-top">
  <div class="container">
    <img src="img/0.jpg.png" class="logo-img" alt>
    <a class="navbar-brand" href="index.html">دليل <span>فعاليات الجامعة الافتراضية السورية</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav1">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav1">
      <ul class="navbar-nav ms-auto text-center gap-1">
        <li class="nav-item"><a class="nav-link active" href="index.html">الرئيسية</a></li>
        <li class="nav-item"><a class="nav-link" href="events.html">كل الفعاليات</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">اتصل بنا</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5" id="eventDetail">

  <span class="badge bg-teal text-white mb-2" id="evCategory" style="background:#4F8C7F;">—</span>
  <h1 id="evTitle" class="mb-3">—</h1>

  <div class="row g-4 mb-4">
    <div class="col-lg-8">
      <img id="evImage" src="" alt="صورة الفعالية" class="map-placeholder" style="height:360px;">
    </div>
    <div class="col-lg-4">
      <div class="ticket-card p-3">
        <p class="mb-2"><strong>📅 التاريخ:</strong> <span id="evDate">—</span></p>
        <p class="mb-3"><strong>📍 المكان:</strong> <span id="evLocation">—</span></p>
        <button id="addToCalendarBtn" class="btn btn-gold w-100 mb-2">أضف للتقويم</button>
        <button id="shareBtn" class="btn btn-outline-navy w-100">شارك الفعالية</button>
      </div>
    </div>
  </div>

  <section class="mb-5">
    <h2 class="section-title">وصف الفعالية</h2>
    <p id="evDesc" class="fs-5" style="line-height:1.9;">—</p>
  </section>

  <section class="mb-5">
    <h2 class="section-title">معرض الصور</h2>
    <div class="d-flex flex-wrap gap-3">
      <img class="evGalleryImg rounded" src="" alt="صورة 1" style="width:220px;height:150px;object-fit:cover;">
      <img class="evGalleryImg rounded" src="" alt="صورة 2" style="width:220px;height:150px;object-fit:cover;">
      <img class="evGalleryImg rounded" src="" alt="صورة 3" style="width:220px;height:150px;object-fit:cover;">
    </div>
  </section>

  <section>
    <h2 class="section-title">فعاليات ذات صلة</h2>
    <div class="row g-4" id="relatedEvents"></div>
  </section>

</main>

<footer class="site-footer">
  <div class="container text-center">
    <p class="mb-0 small">© 2026 دليل فعاليات الجامعة الافتراضية. جميع الحقوق محفوظة.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
